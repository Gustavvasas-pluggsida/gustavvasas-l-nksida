<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gustavvasas-länksida</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #000000;
      --bg2: #0d0d0d;
      --bg3: #1a1a1a;
      --text: #ffffff;
      --text-muted: #666;
      --accent: #ffffff;
      --border: #222;
      --card-bg: #111;
      --card-hover: #181818;
      --tag-bg: #1a1a1a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 64px;
    }

    .site-title {
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .topbar-spacer { flex: 1; }

    /* search */
    .search-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-wrap input {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem;
      font-weight: 300;
      padding: 8px 14px 8px 36px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--text-muted); background: var(--bg2); }

    /* theme button */
    .theme-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 400;
      padding: 7px 12px;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .theme-btn:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── THEME PANEL ── */
    .theme-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 300px;
      background: var(--bg2);
      border-left: 1px solid var(--border);
      z-index: 200;
      padding: 32px 28px;
      flex-direction: column;
      gap: 28px;
      overflow-y: auto;
    }
    .theme-panel.open { display: flex; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .panel-header h2 {
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }
    .close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      padding: 2px 6px;
    }
    .close-btn:hover { color: var(--text); }

    .theme-section h3 {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .preset-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .preset {
      border-radius: 8px;
      cursor: pointer;
      padding: 14px 12px;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .preset:hover { transform: scale(1.03); }
    .preset.active { border-color: var(--accent) !important; }
    .preset-name {
      font-size: 0.75rem;
      font-weight: 500;
    }
    .preset-sub {
      font-size: 0.65rem;
      opacity: 0.6;
    }

    .color-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .color-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .color-item label {
      font-size: 0.8rem;
      font-weight: 300;
      color: var(--text);
    }
    .color-item input[type="color"] {
      width: 36px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: none;
      cursor: pointer;
      padding: 2px;
    }

    /* ── MAIN ── */
    main {
      padding: 48px 40px 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* tab nav */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 400;
      padding: 10px 20px;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
    .tab-btn.all { font-weight: 500; }

    /* grid */
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .link-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 18px;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      gap: 12px;
    }
    .link-card:hover {
      background: var(--card-hover);
      border-color: #333;
      transform: translateY(-2px);
    }

    .link-thumb {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
      background: var(--bg3);
      display: block;
    }
    .link-thumb-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 12px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
    }

    .link-name {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--text);
      text-align: center;
      line-height: 1.3;
    }
    .link-cat {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    /* no results */
    .empty {
      grid-column: 1/-1;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 300;
      padding: 80px 0;
    }

    /* overlay when panel open */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 150;
    }
    .overlay.open { display: block; }

    @media (max-width: 600px) {
      .topbar { padding: 0 20px; gap: 12px; }
      .search-wrap input { width: 140px; }
      main { padding: 32px 20px 60px; }
    }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="site-title">Gustavvasas-länksida</span>
  <div class="topbar-spacer"></div>
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Sök länk..."/>
  </div>
  <button class="theme-btn" onclick="togglePanel()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M2 12h2M20 12h2M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41"/></svg>
    Tema
  </button>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>

<!-- THEME PANEL -->
<div class="theme-panel" id="themePanel">
  <div class="panel-header">
    <h2>Välj tema</h2>
    <button class="close-btn" onclick="togglePanel()">✕</button>
  </div>

  <div class="theme-section">
    <h3>Snabbval</h3>
    <div class="preset-grid" id="presetGrid">
      <!-- filled by JS -->
    </div>
  </div>

  <div class="theme-section">
    <h3>Anpassat</h3>
    <div class="color-row">
      <div class="color-item">
        <label>Bakgrund</label>
        <input type="color" id="pickerBg" oninput="applyCustom()"/>
      </div>
      <div class="color-item">
        <label>Text</label>
        <input type="color" id="pickerText" oninput="applyCustom()"/>
      </div>
      <div class="color-item">
        <label>Kort-bakgrund</label>
        <input type="color" id="pickerCard" oninput="applyCustom()"/>
      </div>
      <div class="color-item">
        <label>Accent / ram</label>
        <input type="color" id="pickerAccent" oninput="applyCustom()"/>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="tabs" id="tabsBar">
    <!-- filled by JS -->
  </div>
  <div class="link-grid" id="linkGrid">
    <!-- filled by JS -->
  </div>
</main>

<script>
// ================================================================
//  KATEGORIER — ändra namnen hur du vill
// ================================================================
const CATEGORIES = [
  { id: 'skola',     label: 'Skola'     },
  { id: 'spelsidor', label: 'Spelsidor' },
  { id: 'ovrigt',    label: 'Övrigt'    },
];

// ================================================================
//  LÄGG TILL LÄNKAR HÄR
//  Kopiera ett objekt och fyll i:
//    name     : länkens namn
//    url      : adressen (med https://)
//    category : 'skola' | 'spelsidor' | 'ovrigt'
//    image    : sökväg eller URL till bild, eller "" för emoji
//    emoji    : visas om image saknas, t.ex. "📚"
// ================================================================
const LINKS = [
  {
    name:     "Classroom",
    url:      "https://classroom.google.com",
    category: "skola",
    image:    "‎images/klasstum.png",
    emoji:    ""
  },
  {
    name:     "Docs",
    url:      "https://docs.google.com/document/u/0/?tgif=d",
    category: "skola",
    image:    "images/unnamed.webp",
    emoji:    ""
  },
  {
    name:     "Coolmathgames",
    url:      "https://www.coolmathgames.com",
    category: "spelsidor",
    image:    "images/unnamed.jpg",
    emoji:    ""
  },
  {
    name:     "Gustavvasas-pluggsida V2",
    url:      "https://gustavvasas-pluggsida.github.io/gustavvasas-pluggsida/",
    category: "spelsidor",
    image:    "images/Gustavvasas pluggsida.png",
    emoji:    ""
  },
  {
    name:     "YouTube",
    url:      "https://www.youtube.com",
    category: "ovrigt",
    image:    "images/youtube-logo-png-46016-1.png",
    emoji:    ""
  },
  {
    name:     "Skolmaten",
    url:      "https://skolmaten.se/bjarehovskolan",
    category: "skola",
    image:    "images/download.jpg",
    emoji:    ""
  },
  {
    name:     "mp3/4 converter",
    url:      "https://yt2mp3.sc/",
    category: "övrigt",
    image:    "images/2071_4-10665553-imgingest-6202630255765322390.avif",
    emoji:    ""
  },
  {
    name:     "Spin the wheel",
    url:      "https://pickerwheel.com/",
    category: "övrigt",
    image:    "images/imaspin.png",
    emoji:    ""
  },
  {
    name:     "Gustavvasas-pluggsida",
    url:      "https://sites.google.com/edu.lomma.se/gustavvasas-pluggsida/startsida",
    category: "spelsidor",
    image:    "images/Gustavvasas pluggsida (1).png",
    emoji:    ""
  },
  {
    name:     "Anchors Arcade",
    url:      "https://anchors-arcade.github.io/V5/",
    category: "spelsidor",
    image:    "images/logo.png",
    emoji:    ""
  },
  {
    name:     "Theo Douglas Oblock",
    url:      "https://sites.google.com/edu.lomma.se/theodouglasoblock/startsida",
    category: "spelsidor",
    image:    "images/Theo Douglas.png",
    emoji:    ""
  },
  {
    name:     "Redflix",
    url:      "https://redflix.co/",
    category: "övrigt",
    image:    "images/images.jpg",
    emoji:    ""
  },
  {
    name:     "InfoMentor",
    url:      "https://infomentor.se/swedish/production/mentor/",
    category: "skola",
    image:    "images/infomentor.webp",
    emoji:    ""
  },
  {
    name:     "MagicStudio AI generator",
    url:      "https://magicstudio.com/ai-art-generator/",
    category: "övrigt",
    image:    "images/magicstudio.webp",
    emoji:    ""
  },
];
// ================================================================

// ── TABS ─────────────────────────────────────────────────────────
let activeTab = 'all';
const tabsBar = document.getElementById('tabsBar');

function buildTabs() {
  tabsBar.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'tab-btn all' + (activeTab === 'all' ? ' active' : '');
  all.textContent = 'Alla';
  all.onclick = () => { activeTab = 'all'; buildTabs(); render(); };
  tabsBar.appendChild(all);

  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (activeTab === cat.id ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => { activeTab = cat.id; buildTabs(); render(); };
    tabsBar.appendChild(btn);
  });
}

// ── RENDER ───────────────────────────────────────────────────────
const grid       = document.getElementById('linkGrid');
const searchInput = document.getElementById('searchInput');

function render() {
  const q = searchInput.value.toLowerCase();
  const filtered = LINKS.filter(l => {
    const matchTab = activeTab === 'all' || l.category === activeTab;
    const matchQ   = !q || l.name.toLowerCase().includes(q) || l.url.toLowerCase().includes(q);
    return matchTab && matchQ;
  });

  grid.innerHTML = '';
  if (!filtered.length) {
    grid.innerHTML = '<p class="empty">Inga länkar hittades.</p>';
    return;
  }

  filtered.forEach(link => {
    const catLabel = CATEGORIES.find(c => c.id === link.category)?.label || link.category;
    const a = document.createElement('a');
    a.className = 'link-card';
    a.href      = link.url;
    a.target    = '_blank';
    a.rel       = 'noopener noreferrer';

    let thumb;
    if (link.image) {
      thumb = document.createElement('img');
      thumb.className = 'link-thumb';
      thumb.src = link.image;
      thumb.alt = link.name;
    } else {
      thumb = document.createElement('div');
      thumb.className = 'link-thumb-placeholder';
      thumb.textContent = link.emoji || '🔗';
    }

    const name = document.createElement('span');
    name.className = 'link-name';
    name.textContent = link.name;

    const cat = document.createElement('span');
    cat.className = 'link-cat';
    cat.textContent = catLabel;

    a.append(thumb, name, cat);
    grid.appendChild(a);
  });
}

searchInput.addEventListener('input', render);

// ── THEME PANEL ──────────────────────────────────────────────────
const PRESETS = [
  { name: 'Svart',    sub: 'Standard', bg: '#000000', text: '#ffffff', card: '#111111', accent: '#ffffff', border: '#222222' },
  { name: 'Vit',      sub: 'Ljust',    bg: '#ffffff', text: '#111111', card: '#f5f5f5', accent: '#111111', border: '#e0e0e0' },
  { name: 'Midnatt',  sub: 'Blå',      bg: '#0a0e1a', text: '#c9d6ff', card: '#101628', accent: '#5b8cff', border: '#1c2440' },
  { name: 'Skogen',   sub: 'Grön',     bg: '#0d1a0f', text: '#c8f0cb', card: '#121f14', accent: '#4ecb5a', border: '#1c3320' },
  { name: 'Solnedgång', sub: 'Orange', bg: '#180c00', text: '#ffd9b0', card: '#1e1000', accent: '#ff8c42', border: '#2e1a00' },
  { name: 'Lila',     sub: 'Neon',     bg: '#0e0014', text: '#e8ccff', card: '#140019', accent: '#c060ff', border: '#240033' },
];

let activePreset = 0;

function applyPreset(idx) {
  activePreset = idx;
  const p = PRESETS[idx];
  const r = document.documentElement.style;
  r.setProperty('--bg',      p.bg);
  r.setProperty('--bg2',     adjustBrightness(p.bg, 8));
  r.setProperty('--bg3',     adjustBrightness(p.bg, 16));
  r.setProperty('--text',    p.text);
  r.setProperty('--text-muted', mixColor(p.text, p.bg, 0.45));
  r.setProperty('--accent',  p.accent);
  r.setProperty('--border',  p.border);
  r.setProperty('--card-bg', p.card);
  r.setProperty('--card-hover', adjustBrightness(p.card, 8));
  r.setProperty('--tag-bg',  adjustBrightness(p.bg, 12));
  // sync pickers
  document.getElementById('pickerBg').value   = p.bg;
  document.getElementById('pickerText').value  = p.text;
  document.getElementById('pickerCard').value  = p.card;
  document.getElementById('pickerAccent').value = p.accent;
  buildPresets();
}

function applyCustom() {
  const bg     = document.getElementById('pickerBg').value;
  const text   = document.getElementById('pickerText').value;
  const card   = document.getElementById('pickerCard').value;
  const accent = document.getElementById('pickerAccent').value;
  const r      = document.documentElement.style;
  r.setProperty('--bg',      bg);
  r.setProperty('--bg2',     adjustBrightness(bg, 8));
  r.setProperty('--bg3',     adjustBrightness(bg, 16));
  r.setProperty('--text',    text);
  r.setProperty('--text-muted', mixColor(text, bg, 0.45));
  r.setProperty('--accent',  accent);
  r.setProperty('--border',  adjustBrightness(bg, 18));
  r.setProperty('--card-bg', card);
  r.setProperty('--card-hover', adjustBrightness(card, 8));
  r.setProperty('--tag-bg',  adjustBrightness(bg, 12));
  activePreset = -1;
  buildPresets();
}

function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = '';
  PRESETS.forEach((p, i) => {
    const el = document.createElement('div');
    el.className = 'preset' + (activePreset === i ? ' active' : '');
    el.style.background = p.bg;
    el.style.borderColor = i === activePreset ? p.accent : 'transparent';
    el.innerHTML = `<span class="preset-name" style="color:${p.text}">${p.name}</span>
                    <span class="preset-sub" style="color:${p.text}">${p.sub}</span>`;
    el.onclick = () => applyPreset(i);
    grid.appendChild(el);
  });
}

// colour helpers
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return [r, g, b];
}
function rgbToHex(r, g, b) {
  return '#' + [r,g,b].map(v => Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
function adjustBrightness(hex, amount) {
  const [r,g,b] = hexToRgb(hex);
  const dark = r + g + b < 384;
  return rgbToHex(r + (dark ? amount : -amount), g + (dark ? amount : -amount), b + (dark ? amount : -amount));
}
function mixColor(hex1, hex2, t) {
  const [r1,g1,b1] = hexToRgb(hex1), [r2,g2,b2] = hexToRgb(hex2);
  return rgbToHex(r1*t + r2*(1-t), g1*t + g2*(1-t), b1*t + b2*(1-t));
}

// ── PANEL TOGGLE ─────────────────────────────────────────────────
function togglePanel() {
  document.getElementById('themePanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}

// ── INIT ─────────────────────────────────────────────────────────
buildTabs();
buildPresets();
render();
</script>
</body>
</html>
